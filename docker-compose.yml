version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: flux-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: flux
      MONGO_INITDB_ROOT_PASSWORD: flux_secret
      MONGO_INITDB_DATABASE: flux
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: flux-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongo_data:
  redis_data:
